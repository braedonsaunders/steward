services:
  guacd:
    image: guacamole/guacd:1.6.0
    container_name: steward-guacd
    restart: unless-stopped

  steward:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steward
    depends_on:
      - guacd
    ports:
      - "3010:3000"
      - "3011:3001"
    volumes:
      - ./.steward:/app/.steward
    restart: unless-stopped
