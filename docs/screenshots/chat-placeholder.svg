  <text x="552" y="242" fill="#F7FAFF" font-size="26" font-family="Arial, Helvetica, sans-serif">Why was the file server slow yesterday?</text>
  <text x="552" y="368" fill="#F7FAFF" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Steward</text>
  <text x="552" y="410" fill="#B7D1E8" font-size="22" font-family="Arial, Helvetica, sans-serif">Between 2:15 PM and 3:40 PM, disk I/O on nas-01 was saturated.</text>
  <text x="552" y="444" fill="#B7D1E8" font-size="22" font-family="Arial, Helvetica, sans-serif">Root cause: backup verification from vm-host-02 over a 1 Gbps link.</text>
  <text x="552" y="478" fill="#B7D1E8" font-size="22" font-family="Arial, Helvetica, sans-serif">Recommendation: move the verification window or add link capacity.</text>
