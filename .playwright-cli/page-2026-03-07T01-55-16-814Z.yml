              - generic [ref=e1110]:
                - paragraph [ref=e1111]: anthropic
                - generic [ref=e1112]:
                  - paragraph [ref=e1113]: "Here are 80 practical network operations hygiene bullets:"
                  - list [ref=e1114]:
                    - listitem [ref=e1115]: Document every static IP assignment in a single source of truth so you never chase conflicts during an outage.
                    - listitem [ref=e1116]: Label every cable run at both ends with a consistent naming scheme that matches your logical topology diagram.
                    - listitem [ref=e1117]: Keep your firmware update schedule quarterly at minimum for routers, switches, and access points to close known CVEs.
                    - listitem [ref=e1118]: Use SNMPv3 instead of v2c wherever possible because community strings travel in cleartext and are trivially sniffable.
                    - listitem [ref=e1119]: Disable unused switch ports and put them in a dead VLAN so rogue devices can't silently join your network.
                    - listitem [ref=e1120]: Set up syslog forwarding from every managed device to a central collector so you have correlated timestamps during incident review.
                    - listitem [ref=e1121]: Enforce NTP synchronization across all infrastructure devices because log correlation is useless when clocks drift.
                    - listitem [ref=e1122]: Segment IoT devices onto their own VLAN with firewall rules that block lateral movement to your management and server subnets.
                    - listitem [ref=e1123]: Monitor DHCP pool utilization and set alerts at 80% so you aren't surprised by address exhaustion on a Monday morning.
                    - listitem [ref=e1124]: Keep a tested, offline backup of every router and switch configuration that is refreshed after each change window.
                    - listitem [ref=e1125]: Use 802.1X or MAC-based authentication on wired ports in sensitive areas to prevent unauthorized physical access to the LAN.
                    - listitem [ref=e1126]: Review your DNS forwarder configuration annually to ensure you aren't leaking queries to deprecated or untrusted upstream resolvers.
                    - listitem [ref=e1127]: Establish a change-management log, even if it's a simple shared spreadsheet, so every config change has a who/what/when/why record.
                    - listitem [ref=e1128]: Run periodic port scans of your own network to detect unexpected services before an attacker does.
                    - listitem [ref=e1129]: Set console and VTY timeouts on network gear to five minutes or less so idle sessions don't become an attack surface.
                    - listitem [ref=e1130]: Disable Telnet and use SSH with key-based authentication on every device that supports it.
                    - listitem [ref=e1131]: Monitor interface error counters (CRC, runts, giants) weekly because a rising trend usually means a failing cable or optic.
                    - listitem [ref=e1132]: Keep a spare switch and a spare access point on the shelf so a hardware failure doesn't turn into a multi-day outage.
                    - listitem [ref=e1133]: Test your UPS runtime under realistic load at least once a year and replace batteries proactively before they fail.
                    - listitem [ref=e1134]: Use HTTPS for every management console and reject self-signed certificates in production wherever a proper CA is available.
                    - listitem [ref=e1135]: Restrict management-plane access to a dedicated management VLAN or subnet and block it from user-facing networks.
                    - listitem [ref=e1136]: Implement rate limiting or storm control on access ports to prevent a single misbehaving device from saturating a broadcast domain.
                    - listitem [ref=e1137]: Track MAC address tables over time so you can detect when a new, unknown device appears on a port that should be static.
                    - listitem [ref=e1138]: Set up automated alerts for link-down events on uplink and trunk ports because those affect entire segments, not just one host.
                    - listitem [ref=e1139]: Review your spanning-tree topology quarterly and verify that root bridge elections match your design intent.
                    - listitem [ref=e1140]: Use BPDU guard on all access ports so a rogue switch can't destabilize your spanning-tree topology.
                    - listitem [ref=e1141]: Keep your SNMP credentials rotated on the same schedule as your admin passwords—stale community strings are a common audit finding.
                    - listitem [ref=e1142]: Document your VLAN map with purpose, subnet, gateway, and DHCP scope for each VLAN so any team member can understand the layout.
                    - listitem [ref=e1143]: Monitor wireless channel utilization and adjust channel plans when co-channel interference degrades client throughput.
                    - listitem [ref=e1144]: Disable WPS on every access point because it is a known brute-forceable weakness regardless of your WPA passphrase strength.
                    - listitem [ref=e1145]: Use WPA3 or at minimum WPA2-Enterprise with RADIUS for any SSID that carries sensitive traffic.
                    - listitem [ref=e1146]: Set wireless client isolation on guest networks so visitors can reach the internet but not each other or your internal hosts.
                    - listitem [ref=e1147]: Audit your firewall rules every six months and remove any rule that no one can justify with a current business need.
                    - listitem [ref=e1148]: Log denied traffic at your perimeter firewall and review the top talkers weekly to spot misconfigured hosts or scanning activity.
                    - listitem [ref=e1149]: Use DNS-based filtering or a secure DNS resolver to block known malware and phishing domains at the network level.
                    - listitem [ref=e1150]: Implement egress filtering so your internal hosts cannot spoof source addresses or reach unexpected destination ports.
                    - listitem [ref=e1151]: Monitor your WAN link utilization with five-minute averages and set alerts at 70% sustained so you can plan capacity before users complain.
                    - listitem [ref=e1152]: Keep your ISP's escalation contacts and circuit IDs in a runbook that is accessible even when your primary systems are down.
                    - listitem [ref=e1153]: Test your failover path (dual WAN, VRRP, HSRP) under controlled conditions at least twice a year, not just during real outages.
                    - listitem [ref=e1154]: Use jumbo frames only where every device in the path supports them, because a single MTU mismatch causes silent packet drops.
                    - listitem [ref=e1155]: Pin trunk port allowed-VLAN lists to only the VLANs that actually need to traverse
