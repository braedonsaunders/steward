                                  - heading [level=2]: Recommended Monitoring Contracts
                                  - heading [level=3]:
                                    - text: 1. 🟢
                                    - strong: HTTP Reachability SLO
                                    - text: (Critical)
                                  - list:
                                    - listitem:
                                      - strong: "What:"
                                      - text: Poll
                                      - code: http://192.168.68.70/
                                      - text: every 5 minutes, expect HTTP 200 or 302
                                    - listitem:
                                      - strong: "Why:"
                                      - text: If this goes down, you lose solar monitoring and MQTT telemetry — you won't know your battery SOC or if the grid has failed
                                    - listitem:
                                      - strong: "Alert:"
                                      - text: If unreachable for >10 minutes
                                  - heading [level=3]:
                                    - text: 2. 🟢
                                    - strong: HTTP Console Profile
                                    - text: (Drift Detection)
                                  - list:
                                    - listitem:
                                      - strong: "What:"
                                      - text: Periodically verify the page title remains "SolarAssistant" and the favicon hash matches
                                      - code: 9452d9c9...
                                    - listitem:
                                      - strong: "Why:"
                                      - text: Detects if the SD card corrupts, the app crashes, or someone re-images the Pi
                                  - heading [level=3]:
                                    - text: 3. 🟡
                                    - strong: MQTT Broker Liveness
                                    - text: (Recommended)
                                  - list:
                                    - listitem:
                                      - strong: "What:"
                                      - text: Verify TCP 1883 is accepting connections
                                    - listitem:
                                      - strong: "Why:"
                                      - text: MQTT is the primary data path to Home Assistant or other consumers — if it dies, dashboards go stale silently
